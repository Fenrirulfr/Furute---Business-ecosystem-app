
<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Furute - Empowering Pune's Business Leaders</title>
  <meta name="description" content="A comprehensive entrepreneurship platform offering mentoring, courses, community networking, B2B marketplace, and exclusive business retreats in Pune.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script type="application/ld+json" id="json-ld-schema"></script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .fill-1 {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    .card-shadow {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .dark .card-shadow {
      background: rgba(10, 17, 24, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 1px 1px rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .glass-container {
      background-color: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.25);
    }
    .dark .glass-container {
      background-color: rgba(15, 23, 42, 0.5);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .light-mode-bg {
      background-color: #f1f5f9; /* slate-100 */
      background-image: radial-gradient(circle at top left, rgba(0, 82, 255, 0.05), transparent 30%), radial-gradient(circle at bottom right, rgba(0, 82, 255, 0.05), transparent 40%);
      background-attachment: fixed;
    }

    .dark .light-mode-bg {
      background: #000000;
    }

    .hero-gradient {
      background: radial-gradient(circle at top right, rgba(0, 82, 255, 0.15), transparent 70%);
    }
    
    .dark .hero-gradient {
      background: radial-gradient(circle at top right, rgba(255, 0, 0, 0.08), transparent 70%);
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    /* Smooth transitions for theme switching */
    body, body *, body *::before, body *::after {
      transition-property: color, background-color, border-color, text-decoration-color, fill, stroke, box-shadow, transform, opacity;
      transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      transition-duration: 300ms;
    }

    /* Input fix for dark mode */
    input::placeholder, textarea::placeholder {
      color: #64748b; /* slate-500 */
    }
    .dark input, .dark textarea, .dark select {
      background-color: rgba(15, 23, 42, 0.6);
      border-color: rgba(255, 255, 255, 0.1);
      color: white;
    }
    .dark input::placeholder, .dark textarea::placeholder {
      color: rgba(148, 163, 184, 0.6);
    }
    .dark input:focus, .dark textarea:focus, .dark select:focus {
      border-color: #FF0000;
      box-shadow: 0 0 0 3px rgba(255, 0, 0, 0.15), 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    }
  </style>
</head>
<body class="light-mode-bg dark:bg-[#000000] text-accent-blue dark:text-gray-100 antialiased font-sans min-h-screen transition-colors duration-500 overflow-x-hidden">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
